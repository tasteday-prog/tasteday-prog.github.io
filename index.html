<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tools Entry</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5efe7;
        color: #2f261f;
        font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(560px, calc(100vw - 48px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 252, 248, 0.92);
        box-shadow: 0 20px 60px rgba(62, 43, 28, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0 0 16px;
      }

      a {
        color: #8a3c46;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Family Tools</h1>
      <p>The body journal is available here:</p>
      <p><a href="/j/">https://tasteday-prog.github.io/j/</a></p>
    </main>
  </body>
</html>
